# Test case definitions for ExaEpi regression tests

test_cases:
  ca:
    name: "California (with air travel)"
    description: "Full California simulation with air travel"
    input_file: inputs.ca
    data_files:
      - CA.dat
      - CA-wf.bin
      - CA_airports.dat
      - CA_CY23AirTraffic.dat
      - July4.cases
    nsteps: 120
    tags: [regional, air_travel, standard]

  ca.noair:
    name: "California (no air travel)"
    description: "California simulation without air travel"
    input_file: inputs.ca.noair
    data_files:
      - CA.dat
      - CA-wf.bin
      - July4.cases
    nsteps: 120
    tags: [regional, no_air, variant]

  ca.random:
    name: "California (random seed)"
    description: "California simulation with random initial conditions"
    input_file: inputs.ca.random
    data_files:
      - CA.dat
      - CA-wf.bin
    nsteps: 120
    tags: [regional, random, variant]

  ca.2dc1c2:
    name: "California (2 disease strains, 1 comm, 2 clusters)"
    description: "Multi-strain California simulation"
    input_file: inputs_2dc1c2.ca
    data_files:
      - CA.dat
      - CA-wf.bin
      - CA_airports.dat
      - CA_CY23AirTraffic.dat
      - July4.cases
    nsteps: 120
    tags: [regional, multi_strain, variant]

  ca.urbanpop:
    name: "California (urban population)"
    description: "California simulation with urban population data"
    input_file: inputs.ca.urbanpop
    data_files:
      - urbanpop_ca.bin
      - July4.cases
    nsteps: 120
    tags: [regional, urban_pop, variant]

  ca.urbanpop.2d:
    name: "California (urban population, 2 diseases)"
    description: "California simulation with urban population and 2 disease strains"
    input_file: inputs.ca.urbanpop.2d
    data_files:
      - urbanpop_ca.bin
      - July4.cases
    nsteps: 120
    tags: [regional, urban_pop, multi_disease, variant]

  bay:
    name: "Bay Area"
    description: "Bay Area simulation with 2 disease strains"
    input_file: inputs.bay
    data_files:
      - BayArea.dat
      - BayArea-wf.bin
      - July4.cases
    nsteps: 70
    tags: [regional, multi_strain, standard]
    # Machine-specific resource overrides
    machine_overrides:
      perlmutter:
        tasks_per_node: 1
        gpus_per_node: 1
      matrix:
        tasks: 1
        gpus: 1
      tuolumne:
        tasks: 1
        gpus: 1
      dane:
        tasks: 25
      linux:
        tasks: 4
      linux-gpu:
        tasks: 1
        gpus: 1

  ma:
    name: "Massachusetts"
    description: "Massachusetts simulation with random initial cases"
    input_file: inputs.ma
    data_files:
      - MA.dat
      - MA-wf.dat
    nsteps: 70
    tags: [regional, random, standard]

  nm:
    name: "New Mexico/Texas"
    description: "New Mexico and Texas simulation"
    input_file: inputs.nm
    data_files:
      - NM_TX_2010.dat
      - US-wf.bin
      - nm-july4.cases
      - small.cases
    nsteps: 120
    tags: [regional, standard]

  nm.urbanpop:
    name: "New Mexico (urban population)"
    description: "New Mexico simulation with urban population data"
    input_file: inputs.nm.urbanpop
    data_files:
      - NM_TX_2010.dat
      - US-wf.bin
      - urbanpop_nm.bin
      - nm-july4.cases
    nsteps: 120
    tags: [regional, urban_pop, variant]

  nm.urbanpop.3d:
    name: "New Mexico (urban population, 3 diseases)"
    description: "New Mexico simulation with urban population and 3 disease strains"
    input_file: inputs.nm.urbanpop.3d
    data_files:
      - urbanpop_nm.bin
    nsteps: 120
    tags: [regional, urban_pop, multi_disease, variant]

# Test groups for batch operations
test_groups:
  standard: [ca, bay, ma, nm]
  all_ca: [ca, ca.noair, ca.random, ca.2dc1c2, ca.urbanpop, ca.urbanpop.2d]
  all_nm: [nm, nm.urbanpop, nm.urbanpop.3d]
  all_variants: [ca.noair, ca.random, ca.2dc1c2, ca.urbanpop, ca.urbanpop.2d, nm.urbanpop, nm.urbanpop.3d]
  urbanpop: [ca.urbanpop, ca.urbanpop.2d, nm.urbanpop, nm.urbanpop.3d]
  multi_disease: [ca.2dc1c2, bay, ca.urbanpop.2d, nm.urbanpop.3d]
  quick: [bay, ma]
  full: [ca, ca.noair, ca.random, ca.2dc1c2, ca.urbanpop, ca.urbanpop.2d, bay, ma, nm, nm.urbanpop, nm.urbanpop.3d]
